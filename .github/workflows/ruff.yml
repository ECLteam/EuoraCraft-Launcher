name: Ruff Lint

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  ruff:
    name: Run ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff
        run: |
          # Run ruff over the repository and output GitHub annotations
          ruff check . --format github
