name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        working-directory: ./EuoraCraftLauncher-UI
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: ./EuoraCraftLauncher-UI
        run: pnpm build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: EuoraCraftLauncher-UI/dist
          retention-days: 1

  build-windows:
    name: Build Windows
    needs: build-frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: EuoraCraftLauncher-UI/dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller EuoraCraft-Launcher.spec

      - name: Package artifact
        run: |
          cd dist
          7z a -tzip "../EuoraCraft-Launcher-windows-x64.zip" "EuoraCraft Launcher"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: EuoraCraft-Launcher-windows-x64.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: EuoraCraft-Launcher-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: EuoraCraftLauncher-UI/dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller EuoraCraft-Launcher.spec

      - name: Package artifact
        run: |
          cd dist
          tar -czf "../EuoraCraft-Launcher-linux-x64.tar.gz" "EuoraCraft Launcher"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: EuoraCraft-Launcher-linux-x64.tar.gz

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: EuoraCraft-Launcher-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS
    needs: build-frontend
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: EuoraCraftLauncher-UI/dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller EuoraCraft-Launcher.spec

      - name: Package artifact
        run: |
          cd dist
          tar -czf "../EuoraCraft-Launcher-macos-x64.tar.gz" "EuoraCraft Launcher"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: EuoraCraft-Launcher-macos-x64.tar.gz

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: EuoraCraft-Launcher-macos-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-arm64:
    name: Build macOS (Apple Silicon)
    needs: build-frontend
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: EuoraCraftLauncher-UI/dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller EuoraCraft-Launcher.spec

      - name: Package artifact
        run: |
          cd dist
          tar -czf "../EuoraCraft-Launcher-macos-arm64.tar.gz" "EuoraCraft Launcher"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: EuoraCraft-Launcher-macos-arm64.tar.gz

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: EuoraCraft-Launcher-macos-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
