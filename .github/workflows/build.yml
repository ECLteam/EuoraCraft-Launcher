name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # build backend with matrix
  build-backend:
    name: Build Backend
    needs: build-frontend
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, windows-11-arm, ubuntu-latest,ubuntu-latest-arm, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies for Linux
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Inject MICROSOFT_CLIENT_ID
        shell: bash
        env:
          CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
        run: |
          python - <<'PY'
          import os, re
          path = "ECL/common/build_env.py"
          with open(path, encoding="utf-8") as f:
              text = f.read()
          cid = os.environ["CLIENT_ID"]
          text = re.sub(r'MICROSOFT_CLIENT_ID\s*=\s*"[^"]*"', f'MICROSOFT_CLIENT_ID = "{cid}"', text)
          with open(path, "w", encoding="utf-8") as f:
              f.write(text)
          PY

      - name: Build with PyInstaller
        run: pyinstaller EuoraCraft-Launcher.spec

      - name: Package artifact for Unix
        if: ${{ runner.os != 'Windows'}}
        run: |
          cd dist
          7z a -tzip "../EuoraCraft-Launcher-${{ runner.os }}-${{ runner.arch }}.zip" "EuoraCraft Launcher"

      - name: Package artifact for Windows
        if: ${{runner.os == 'Windows'}}
        run: |
          cd dist
          7z a -tzip "../EuoraCraft-Launcher-${{ runner.os }}-${{ runner.arch }}.zip" "EuoraCraft Launcher.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: EuoraCraft-Launcher-${{ runner.os }}-${{ runner.arch }}.zip
          archive: false
          
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: EuoraCraft-Launcher-${{ runner.os }}-${{ runner.arch }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

