name: Sync Submodule

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
    sync:
        runs-on: ubuntu-latest
        steps:
            - uses: luyanci/github-action-create-pr-parent-submodule@main
              id: sync_submodule
              with:
                pr_against_branch: main
                checkout_branch: main
